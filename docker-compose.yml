version: "3.9"

services:
  app_api:
    image: node:20-alpine
    container_name: fakemarket_api
    working_dir: /opt/api
    volumes:
      - ./api:/opt/app
    command: sh -c "npm i && npm start"
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: fakedata
      DB_USER: admin
      DB_PASSWORD: pass123
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: fakemarket_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fakemarket
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pass123
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data