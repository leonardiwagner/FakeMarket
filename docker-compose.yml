version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: fakemarket_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fakemarket
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pass123
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
  app_order_processing:
    image: node:20-alpine
    container_name: fakemarket_order_processing
    working_dir: /opt/app
    volumes:
      - ./order-processing:/opt/app
    command: sh -c "npm i && npm start"
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: fakedata
      DB_USER: admin
      DB_PASSWORD: pass123
    depends_on:
      - db
  app_robots:
    image: node:20-alpine
    container_name: fakemarket_robots
    working_dir: /opt/app
    volumes:
      - ./robots:/opt/app
    command: sh -c "npm i && npm start"
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: fakedata
      DB_USER: admin
      DB_PASSWORD: pass123
    depends_on:
      - db