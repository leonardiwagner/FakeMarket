version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: fakemarket_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fakemarket
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: pass123
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data